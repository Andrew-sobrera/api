directory=/var/www/api
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/api/storage/logs/worker-tickets-expiration.log
stopwaitsecs=3600
