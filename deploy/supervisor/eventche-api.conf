directory=/var/www/api
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/api/storage/logs/worker-payments-webhook.log
stopwaitsecs=3600

[program:api-worker-emails]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/api/artisan queue:work rabbitmq --queue=emails --sleep=3 --tries=3 --timeout=90 --max-time=3600
directory=/var/www/api
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/api/storage/logs/worker-emails.log
stopwaitsecs=3600

[program:api-worker-tickets-generation]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/api/artisan queue:work rabbitmq --queue=tickets.generation --sleep=3 --tries=3 --timeout=180 --max-time=3600
directory=/var/www/api
autostart=true
